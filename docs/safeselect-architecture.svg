<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'SF Mono','Menlo','Monaco','Courier New',monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa3ad"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101820"/>
      <stop offset="100%" stop-color="#1d2430"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b68ee"/>
      <stop offset="100%" stop-color="#5545c8"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dea584"/>
      <stop offset="100%" stop-color="#b66f4d"/>
    </linearGradient>
    <linearGradient id="java" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5382a1"/>
      <stop offset="100%" stop-color="#2f607c"/>
    </linearGradient>
    <linearGradient id="doc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a66b"/>
      <stop offset="100%" stop-color="#227a47"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="520" rx="12" fill="url(#bg)"/>
  <text x="450" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#f1f5f9">SafeSelect Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="10" fill="#a8b3c2">Read-only SQL and NoSQL tools for AI agents</text>

  <rect x="50" y="115" width="200" height="110" rx="10" fill="url(#agent)" filter="url(#shadow)"/>
  <text x="150" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">AI Agent</text>
  <text x="150" y="172" text-anchor="middle" font-size="10" fill="#e6e1ff">OpenCode / Copilot / Cursor</text>
  <text x="150" y="191" text-anchor="middle" font-size="10" fill="#d8d1ff">MCP stdio client</text>

  <rect x="335" y="90" width="250" height="235" rx="12" fill="#151b25" stroke="#dea584" stroke-width="2" filter="url(#shadow)"/>
  <rect x="335" y="90" width="250" height="36" rx="12" fill="url(#rust)"/>
  <rect x="335" y="112" width="250" height="14" fill="url(#rust)"/>
  <text x="460" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#101820">safeselect (Rust)</text>

  <rect x="360" y="146" width="200" height="32" rx="6" fill="#331a1a" stroke="#ef6b6b" stroke-width="1.5"/>
  <text x="460" y="166" text-anchor="middle" font-size="10" font-weight="700" fill="#ff9a9a">Policy engine</text>

  <rect x="360" y="190" width="200" height="32" rx="6" fill="#142436" stroke="#59a8f7" stroke-width="1.5"/>
  <text x="460" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#86c5ff">MCP tools</text>

  <rect x="360" y="234" width="200" height="32" rx="6" fill="#2a2039" stroke="#c79af0" stroke-width="1.5"/>
  <text x="460" y="254" text-anchor="middle" font-size="10" font-weight="700" fill="#d9b5ff">Config + secrets</text>

  <rect x="360" y="278" width="200" height="28" rx="6" fill="#d74747"/>
  <text x="460" y="296" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">FAIL CLOSED ON VIOLATION</text>

  <rect x="340" y="370" width="240" height="72" rx="10" fill="url(#java)" filter="url(#shadow)"/>
  <text x="460" y="401" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Embedded Java sidecar</text>
  <text x="460" y="421" text-anchor="middle" font-size="10" fill="#d7ecff">JDBC + MongoDB driver</text>

  <rect x="665" y="115" width="185" height="86" rx="10" fill="#223248" stroke="#6ba7db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="758" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">SQL databases</text>
  <text x="758" y="171" text-anchor="middle" font-size="10" fill="#cde8ff">PostgreSQL now</text>

  <rect x="665" y="250" width="185" height="86" rx="10" fill="url(#doc)" filter="url(#shadow)"/>
  <text x="758" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">NoSQL databases</text>
  <text x="758" y="306" text-anchor="middle" font-size="10" fill="#d7ffe6">MongoDB now</text>

  <rect x="62" y="300" width="176" height="45" rx="8" fill="#151b25" stroke="#f3b74b" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="150" y="324" text-anchor="middle" font-size="10" font-weight="700" fill="#ffd37a">macOS Keychain</text>
  <text x="150" y="338" text-anchor="middle" font-size="8" fill="#a8b3c2">or environment variables</text>

  <rect x="62" y="370" width="176" height="45" rx="8" fill="#151b25" stroke="#9aa3ad" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="150" y="394" text-anchor="middle" font-size="10" font-weight="700" fill="#e2e8f0">Project policy</text>
  <text x="150" y="408" text-anchor="middle" font-size="8" fill="#a8b3c2">.safeselect/*.toml</text>

  <line x1="250" y1="170" x2="327" y2="170" stroke="#b7c0cc" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="289" y="157" text-anchor="middle" font-size="8" fill="#b7c0cc">MCP JSON-RPC</text>

  <path d="M 580 392 C 628 392, 616 158, 665 158" fill="none" stroke="#8ba4ba" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="626" y="262" text-anchor="middle" font-size="8" fill="#8ba4ba" transform="rotate(-84 626 262)">JDBC</text>

  <path d="M 580 420 C 628 420, 616 294, 665 294" fill="none" stroke="#8bc5a3" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="626" y="358" text-anchor="middle" font-size="8" fill="#9fe0b8" transform="rotate(-72 626 358)">MongoDB driver</text>

  <line x1="430" y1="326" x2="430" y2="364" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="492" y1="364" x2="492" y2="326" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="394" y="347" text-anchor="middle" font-size="8" fill="#9aa3ad">requests</text>
  <text x="529" y="347" text-anchor="middle" font-size="8" fill="#9aa3ad">responses</text>
  <text x="461" y="357" text-anchor="middle" font-size="8" fill="#9aa3ad">JSON-lines stdio</text>

  <path d="M 238 323 C 280 323, 300 250, 335 250" fill="none" stroke="#f3b74b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <path d="M 238 392 C 285 392, 300 270, 335 270" fill="none" stroke="#9aa3ad" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>

  <text x="65" y="470" font-size="9" fill="#a8b3c2">Security boundary: read-only policy, scope control, limits, audit, fail-closed exits.</text>
  <text x="65" y="491" font-size="9" fill="#a8b3c2">Runtime boundary: MCP and sidecar use stdio; SafeSelect opens no listening ports.</text>
</svg>
