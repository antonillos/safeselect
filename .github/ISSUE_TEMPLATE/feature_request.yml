name: Feature Request
description: Suggest an enhancement for SafeSelect
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else have you considered?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any relevant examples or references
