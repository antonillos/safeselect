name: Bug Report
description: Report a security issue or bug in SafeSelect
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce
  - type: input
    id: version
    attributes:
      label: Version
      description: "safeselect --version"
