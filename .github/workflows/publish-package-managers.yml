name: Publish Package Managers

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish, e.g. v0.1.0
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - name: Validate release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          case "${VERSION}" in
            v*) ;;
            *) printf 'Error: version must start with v, got %s\n' "${VERSION}" >&2; exit 1 ;;
          esac
          gh release view "${VERSION}" --repo "${{ github.repository }}" >/dev/null
          printf 'version=%s\n' "${VERSION}" >> "${GITHUB_OUTPUT}"
      - name: Read release asset checksums
        id: checksums
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/checksums
          gh release download "${VERSION}" \
            --repo "${{ github.repository }}" \
            --pattern "safeselect-${VERSION}-aarch64-apple-darwin.tar.gz.sha256" \
            --pattern "safeselect-${VERSION}-x86_64-apple-darwin.tar.gz.sha256" \
            --dir dist/checksums

          arm_sha="$(awk '{print $1}' "dist/checksums/safeselect-${VERSION}-aarch64-apple-darwin.tar.gz.sha256")"
          intel_sha="$(awk '{print $1}' "dist/checksums/safeselect-${VERSION}-x86_64-apple-darwin.tar.gz.sha256")"

          printf 'arm-sha=%s\n' "${arm_sha}" >> "${GITHUB_OUTPUT}"
          printf 'intel-sha=%s\n' "${intel_sha}" >> "${GITHUB_OUTPUT}"
      - name: Publish Homebrew tap
        env:
          RELEASE_TOKEN: ${{ secrets.SAFESELECT_RELEASE_TOKEN }}
          VERSION: ${{ steps.release.outputs.version }}
          ARM_SHA: ${{ steps.checksums.outputs.arm-sha }}
          INTEL_SHA: ${{ steps.checksums.outputs.intel-sha }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TOKEN}" ]]; then
            printf 'Skipping Homebrew tap update: SAFESELECT_RELEASE_TOKEN is not configured.\n' >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          git clone "https://x-access-token:${RELEASE_TOKEN}@github.com/antonillos/homebrew-tap.git" homebrew-tap
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p Formula
          cat > Formula/safeselect.rb <<FORMULA
          class Safeselect < Formula
            desc "MCP SQL Fail-Closed for AI Agents"
            homepage "https://github.com/antonillos/safeselect"
            license "MIT OR Apache-2.0"

            if Hardware::CPU.arm?
              url "https://github.com/antonillos/safeselect/releases/download/${VERSION}/safeselect-${VERSION}-aarch64-apple-darwin.tar.gz"
              sha256 "${ARM_SHA}"
            else
              url "https://github.com/antonillos/safeselect/releases/download/${VERSION}/safeselect-${VERSION}-x86_64-apple-darwin.tar.gz"
              sha256 "${INTEL_SHA}"
            end

            depends_on "openjdk@17"

            def install
              bin.install "safeselect"
            end

            test do
              assert_match "safeselect #{version}", shell_output("\#{bin}/safeselect --version")
            end
          end
          FORMULA

          if git diff --quiet; then
            printf 'Homebrew tap already up to date for %s.\n' "${VERSION}" >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          git add Formula/safeselect.rb
          git commit -m "safeselect ${VERSION}"
          git push origin HEAD:main
          printf 'Updated Homebrew tap for %s.\n' "${VERSION}" >> "${GITHUB_STEP_SUMMARY}"
