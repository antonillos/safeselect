name: Verify

on:
  pull_request:
    branches:
      - develop
      - main
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    name: Unit & Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Build sidecar
        run: |
          mvn -f sidecar/pom.xml package -DskipTests
          cp sidecar/target/safeselect-sidecar-*.jar sidecar/target/safeselect-sidecar.jar
      - name: Check compilation
        run: cargo check
      - name: All tests (unit + smoke)
        run: cargo test
        env:
          CARGO_TERM_COLOR: always

  integration:
    name: Integration (PostgreSQL)
    needs: unit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 25432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Build sidecar
        run: |
          mvn -f sidecar/pom.xml package -DskipTests
          cp sidecar/target/safeselect-sidecar-*.jar sidecar/target/safeselect-sidecar.jar
      - name: Download PostgreSQL driver
        run: cargo run -- driver download --vendor postgresql
      - name: Integration tests
        run: cargo test --test integration
        env:
          SAFESELECT_INTEGRATION_TEST: "1"
          SAFESELECT_INT_TEST_PASSWORD: testpass

  security:
    name: Security & Licenses
    needs: unit
    if: >
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'safe-to-merge')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Install cargo-binstall
        run: curl -fsSL https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Install audit & deny tools
        shell: bash
        run: |
          cargo binstall cargo-audit --locked -q
          cargo binstall cargo-deny --locked -q
      - name: Run cargo audit
        run: cargo audit
      - name: Run cargo deny
        run: cargo deny check
