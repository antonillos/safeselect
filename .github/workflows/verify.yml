name: Verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SAFESELECT_INTEGRATION_TEST: "1"
  SAFESELECT_INT_TEST_PASSWORD: "testpass"

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 25432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        shell: bash
        run: rustup toolchain install stable --profile minimal
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Build sidecar
        run: |
          mvn -f sidecar/pom.xml package -DskipTests
          cp sidecar/target/safeselect-sidecar-*.jar sidecar/target/safeselect-sidecar.jar
      - name: Check compilation
        run: cargo check
      - name: Install audit & deny tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
      - name: Security audit
        run: cargo audit
      - name: License check
        run: cargo deny check
      - name: Run unit tests
        run: cargo test --lib
      - name: Download PostgreSQL driver
        run: cargo run -- driver download --vendor postgresql
      - name: Run smoke tests
        run: cargo test --test smoke
      - name: Run integration test
        run: cargo test --test integration
