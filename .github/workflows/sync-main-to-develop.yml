name: Sync Main To Develop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-main-to-develop
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Prepare sync branch
        id: sync
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main develop
          if git merge-base --is-ancestor origin/main origin/develop; then
            printf 'needed=false\n' >> "${GITHUB_OUTPUT}"
            printf 'Develop already contains main. Nothing to sync.\n' >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          branch="sync/main-to-develop"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${branch}" origin/develop

          # Record main as an ancestor of develop instead of copying main's file
          # snapshot. Non-conflicting changes from both branches are retained. If
          # both branches changed the same lines, keep develop's version because
          # it contains the work that happened after the release.
          git merge \
            --no-ff \
            --strategy=ort \
            --strategy-option=ours \
            --message "chore: sync main into develop" \
            origin/main

          git merge-base --is-ancestor origin/main HEAD
          git push --force-with-lease origin "${branch}"

          printf 'needed=true\n' >> "${GITHUB_OUTPUT}"
          printf 'branch=%s\n' "${branch}" >> "${GITHUB_OUTPUT}"
      - name: Open sync PR
        if: steps.sync.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          branch="${{ steps.sync.outputs.branch }}"
          title="chore: sync main into develop"
          body="Merge main back into develop after release so both branches share history. Non-conflicting changes from both branches are retained; overlapping lines keep the newer develop version."
          pr_url=""
          pr_number=""

          pr_number="$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${branch}" \
            --base develop \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "${pr_number}" ]]; then
            pr_url="$(gh pr view "${pr_number}" --repo "${{ github.repository }}" --json url --jq .url)"
            gh pr edit "${pr_number}" --repo "${{ github.repository }}" --title "${title}" --body "${body}"
          else
            if ! pr_url="$(gh pr create \
              --repo "${{ github.repository }}" \
              --base develop \
              --head "${branch}" \
              --title "${title}" \
              --body "${body}")"; then
              {
                printf '## Sync PR not created automatically\n\n'
                printf 'The sync branch was pushed successfully, but this repository does not allow GitHub Actions to create pull requests.\n\n'
                printf 'Create it manually with:\n\n'
                printf '```bash\n'
                printf 'gh pr create --repo %s --base develop --head %s --title %q --body %q\n' \
                  "${{ github.repository }}" "${branch}" "${title}" "${body}"
                printf '```\n'
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 0
            fi
          fi

          printf 'Sync PR: %s\n' "${pr_url}" >> "${GITHUB_STEP_SUMMARY}"
