name: Integration Tests

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch or commit to test
        required: false
        default: ""
  workflow_call:
    inputs:
      target_ref:
        description: Branch or commit to test
        required: false
        type: string

jobs:
  integration-tests:
    name: Real Integration Tests
    runs-on: ubuntu-latest
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_NET_RETRY: "10"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.target_ref || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Start integration services
        run: docker compose -f docker-compose.integration.yml up -d --wait

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build sidecar
        run: |
          cd sidecar
          mvn clean package -DskipTests
          cp target/safeselect-sidecar-*.jar target/safeselect-sidecar.jar

      - name: Build SafeSelect
        run: cargo build --release

      - name: Download PostgreSQL JDBC driver
        run: cargo run -- driver download --vendor postgresql

      - name: Run security tests
        env:
          SAFESELECT_SECURITY_TEST: 1
          SAFESELECT_SECURITY_HOST: localhost
          SAFESELECT_SECURITY_PORT: 5432
          SAFESELECT_SECURITY_ADMIN_USER: postgres
          SAFESELECT_SECURITY_ADMIN_PASSWORD: testpass
          SAFESELECT_MONGODB_HOST: localhost
          SAFESELECT_MONGODB_PORT: 27017
          SAFESELECT_MONGODB_ADMIN_USER: root
          SAFESELECT_MONGODB_ADMIN_PASSWORD: testpass
          SAFESELECT_MONGODB_DOCKER_CONTAINER: safeselect-mongodb-1
        run: |
          echo "=== Running Security Tests ==="
          cargo test --test security -- --nocapture

      - name: Run smoke tests
        env:
          SAFESELECT_REAL_SMOKE_TEST: 1
          SAFESELECT_SECURITY_HOST: localhost
          SAFESELECT_SECURITY_PORT: 5432
          SAFESELECT_SECURITY_ADMIN_USER: postgres
          SAFESELECT_SECURITY_ADMIN_PASSWORD: testpass
        run: |
          echo "=== Running Smoke Tests ==="
          cargo test --test smoke_suite postgres_smoke_errors_and_timeouts -- --nocapture

      - name: Run reconnect test
        env:
          SAFESELECT_RECONNECT_TEST: 1
          SAFESELECT_SECURITY_HOST: localhost
          SAFESELECT_SECURITY_PORT: 5432
          SAFESELECT_SECURITY_ADMIN_USER: postgres
          SAFESELECT_SECURITY_ADMIN_PASSWORD: testpass
        run: |
          echo "=== Running Reconnect Test ==="
          cargo test --test smoke_suite postgres_reconnect_after_docker_restart -- --nocapture

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-logs
          path: |
            target/debug/deps/*.log
            ~/.local/state/safeselect/logs/
          retention-days: 7

      - name: Stop integration services
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v
