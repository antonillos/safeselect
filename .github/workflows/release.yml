name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Build sidecar
        run: mvn -f sidecar/pom.xml package -DskipTests
        shell: bash

      - name: Copy sidecar JAR
        run: cp sidecar/target/safeselect-sidecar-*.jar sidecar/target/safeselect-sidecar.jar
        shell: bash

      - name: Build Rust binary
        run: cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}
        shell: bash

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf safeselect-${{ matrix.target }}.tar.gz safeselect
          sha256sum safeselect-${{ matrix.target }}.tar.gz > safeselect-${{ matrix.target }}.tar.gz.sha256
        shell: bash

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/safeselect-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/safeselect-${{ matrix.target }}.tar.gz.sha256
